services:

  # ── TRAEFIK: balanceador de carga ─────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: traefik
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - "3000:80"      # API → http://localhost:3000
      - "8090:8080"    # Dashboard → http://localhost:8090
    networks:
      - red-app
    restart: unless-stopped

  # ── API GATEWAY (sin container_name → escalable con --scale) ──
  api-gateway:
    build: ./api-gateway
    # SIN container_name fijo para permitir múltiples instancias
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - user-service
      - catalog-service
      - recommendation-service
      - cart-service
      - payment-service
    networks:
      - red-app

  # ── FRONTEND ──────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8082:80"
    depends_on:
      - traefik
    networks:
      - red-app

  # ── MICROSERVICIOS ────────────────────────────────────────
  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      - mongodb
    networks:
      - red-app

  catalog-service:
    build: ./catalog-service
    container_name: catalog-service
    depends_on:
      - mongodb
    networks:
      - red-app

  recommendation-service:
    build: ./recommendation-service
    container_name: recommendation-service
    depends_on:
      - user-service
      - catalog-service
    networks:
      - red-app

  cart-service:
    build: ./cart-service
    container_name: cart-service
    depends_on:
      - mongodb
    networks:
      - red-app

  payment-service:
    build: ./payment-service
    container_name: payment-service
    depends_on:
      - mongodb
    networks:
      - red-app

  # ── BASE DE DATOS ─────────────────────────────────────────
  mongodb:
    image: mongo
    container_name: mongodb
    volumes:
      - mongo_data:/data/db
    networks:
      - red-app

  # ── PRUEBAS DE CARGA con k6 ───────────────────────────────
  k6:
    image: grafana/k6
    container_name: k6-prueba
    volumes:
      - ./tests:/scripts
    depends_on:
      - traefik
    networks:
      - red-app
    command: run /scripts/performance-test.js

volumes:
  mongo_data:

networks:
  red-app:
    driver: bridge