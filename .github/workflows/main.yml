name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Instalar dependencias API Gateway
        run: |
          cd api-gateway
          npm install

      - name: Instalar dependencias User Service
        run: |
          cd user-service
          npm install

      - name: Instalar dependencias Catalog Service
        run: |
          cd catalog-service
          npm install

      - name: Instalar dependencias Recommendation Service
        run: |
          cd recommendation-service
          npm install

      - name: Validación final
        run: echo "Proyecto validado correctamente"